<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Очень Большая Бродилка — веб-прототип</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="score-strip" id="scoreStrip" aria-label="Игроки"></section>

      <section class="play-area">
        <article class="board-panel" aria-label="Игровое поле">
          <div class="board-header">
            <div class="dice-panel">
              <span id="diceValue">-</span>
              <div id="fieldEffect" class="field-effect"></div>
              <div id="turnActions" class="turn-actions" aria-label="Доступные действия"></div>
              <button id="rollBtn">Бросить кубик</button>
            </div>
          </div>
          <div class="map-wrap">
            <div id="eventToast" class="event-toast" role="button" tabindex="0" aria-live="polite" hidden></div>
            <div id="finalBattleHud" class="final-battle-hud" aria-live="polite" hidden></div>
            <div id="winnerPopup" class="winner-popup" aria-live="polite" hidden></div>
            <div id="choicePanel" class="choice-panel" role="dialog" aria-live="polite" hidden></div>
            <div id="board" class="board"></div>
          </div>
        </article>

        <aside class="side-panel" aria-label="Информация партии">
          <section class="game-settings" aria-label="Панель партии">
            <div class="season-controls">
              <label>
                Игроков
                <select id="playerCount">
                  <option value="2" selected>2</option>
                  <option value="3">3</option>
                  <option value="4">4</option>
                </select>
              </label>
              <label>
                Кубиков
                <select id="diceCount">
                  <option value="1" selected>1</option>
                  <option value="2">2</option>
                  <option value="3">3</option>
                  <option value="4">4</option>
                </select>
              </label>
              <button id="newGameBtn" class="secondary">Новая игра</button>
            </div>
          </section>
          <section class="tadam-card">
            <div class="section-title">
              <h2>ТАДАМ!</h2>
              <span class="pill">до 3 карт</span>
            </div>
            <div id="tadamTable" class="tadam-table"></div>
          </section>
        </aside>
      </section>

      <section class="lower-grid">
        <article class="log-panel">
          <div class="section-title">
            <h2>Хроника</h2>
          </div>
          <ol id="gameLog" class="game-log"></ol>
        </article>
      </section>

    </main>

    <script type="module" src="./src/game.js?v=20260520-0240"></script>
  </body>
</html>
