<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Очень Большая Бродилка — веб-прототип</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;500;700;800;900&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="./styles.css?v=20260623-0034" />
  </head>
  <body data-ui-style="classic" data-font-style="standard">
    <main class="app-shell">
      <section class="score-strip" id="scoreStrip" aria-label="Игроки"></section>
      <div id="monsterRageIndicator" class="monster-rage-indicator" aria-live="polite" hidden></div>

      <section class="play-area">
        <article class="board-panel" aria-label="Игровое поле">
          <div class="map-wrap">
            <div id="eventToast" class="event-toast" role="button" tabindex="0" aria-live="polite" hidden></div>
            <div id="monsterDefeatBanner" class="monster-defeat-banner" aria-live="polite" hidden></div>
            <div id="finalBattleHud" class="final-battle-hud" aria-live="polite" hidden></div>
            <div id="winnerPopup" class="winner-popup" aria-live="polite" hidden></div>
            <div id="choicePanel" class="choice-panel" role="dialog" aria-live="polite" hidden></div>
            <div id="board" class="board"></div>
          </div>
          <div class="board-header">
            <div class="dice-panel">
              <span id="diceValue">-</span>
              <div id="fieldEffect" class="field-effect"></div>
              <div id="turnActions" class="turn-actions" aria-label="Доступные действия"></div>
              <button id="rollBtn">Бросить <img class="dice-icon" src="./assets/icons/dice.png?v=20260524-0305" alt="" aria-hidden="true"></button>
            </div>
          </div>
        </article>

        <aside class="side-panel" aria-label="Информация партии">
          <section class="game-settings" aria-label="Панель партии">
            <div class="season-controls">
              <label>
                <span class="control-label-copy">Игроков</span>
                <select id="playerCount">
                  <option value="2" selected>2</option>
                  <option value="3">3</option>
                  <option value="4">4</option>
                </select>
              </label>
              <label>
                <span class="control-label-copy">Ботов</span>
                <select id="botCount">
                  <option value="0" selected>0</option>
                  <option value="1">1</option>
                  <option value="2">2</option>
                  <option value="3">3</option>
                  <option value="4">4</option>
                </select>
              </label>
              <div class="header-icon-actions" aria-label="Быстрые действия">
                <button id="referenceHeaderBtn" class="secondary header-icon-button reference-header-toggle" type="button" title="Показать карты и поля" aria-label="Показать карты и поля" aria-pressed="false">
                  <img class="reference-header-icon" src="./assets/icons/reference_cards.svg" alt="" aria-hidden="true">
                </button>
                <button id="phoneRoomHeaderBtn" class="secondary header-icon-button phone-room-toggle" type="button" title="Играть с телефонами" aria-label="Играть с телефонами" aria-pressed="false">
                  <svg class="phone-header-icon" viewBox="0 0 24 24" aria-hidden="true">
                    <rect x="7.25" y="3.25" width="9.5" height="17.5" rx="2.15" />
                    <path d="M10.15 5.65h3.7M10.75 18.05h2.5" />
                  </svg>
                </button>
                <button id="settingsToggle" class="secondary settings-toggle header-icon-button" type="button" title="Настройки" aria-label="Настройки" aria-expanded="false">
                  <img class="settings-icon" src="./assets/icons/settings_gear.svg?v=20260621-2257" alt="" aria-hidden="true">
                </button>
                <button id="fullscreenBtn" class="secondary fullscreen-toggle header-icon-button" type="button" title="Открыть игру на весь экран" aria-label="На весь экран">
                  <img class="fullscreen-icon" src="./assets/icons/fullscreen_button.svg?v=20260621-2305" alt="" aria-hidden="true">
                </button>
                <span id="phoneRoomHeaderFeedback" class="phone-room-header-feedback" role="status" aria-live="polite" hidden>Комната скопирована</span>
              </div>
              <button id="newGameBtn" class="secondary">Новая игра</button>
            </div>
            <section class="phone-room-panel" aria-label="Мобильные контроллеры" hidden>
              <div class="phone-room-header">
                <strong>Телефоны</strong>
                <button id="createPhoneRoomBtn" class="secondary" type="button">Создать комнату</button>
              </div>
              <div id="phoneRoomStatus" class="phone-room-status">Комната не создана</div>
              <div id="phoneRoomDetails" class="phone-room-details" hidden>
                <div class="phone-room-code-card">
                  <span>Код</span>
                  <b id="phoneRoomCode">-</b>
                </div>
                <label class="phone-room-link-card">
                  <span>Ссылка</span>
                  <input id="phoneRoomUrl" type="text" readonly value="" />
                </label>
                <button id="copyPhoneRoomUrlBtn" class="secondary phone-room-copy" type="button">Скопировать ссылку</button>
              </div>
              <section class="phone-room-settings" aria-label="Настройки телефонов">
                <button id="phoneRoomSettingsToggle" class="secondary phone-room-settings-toggle" type="button" aria-expanded="false" aria-controls="phoneRoomSettingsBody">
                  Настройки телефонов
                </button>
                <div id="phoneRoomSettingsBody" class="phone-room-settings-body" hidden>
                  <div class="phone-room-settings-grid">
                    <label class="phone-room-mode">
                      <span>Режим</span>
                      <select id="phoneRoomMode">
                        <option value="full" selected>Полный контроллер</option>
                        <option value="big-button">Большая кнопка</option>
                      </select>
                    </label>
                    <label class="cheat-toggle phone-dice-toggle">
                      <input id="phoneRoomDice" type="checkbox" />
                      <span>Не отображать кубики</span>
                    </label>
                  </div>
                  <div id="phoneRoomControllers" class="phone-room-controllers"></div>
                </div>
              </section>
            </section>
            <div id="settingsPanel" class="settings-panel" hidden>
              <div class="exact-move-row" aria-label="Чит точного движения активного игрока">
                <label class="settings-select exact-move-setting">
                  <span>Пройти</span>
                  <input id="exactMoveAmount" type="number" min="0" step="1" value="4" />
                </label>
                <button id="exactMoveBtn" class="secondary" type="button">Идти</button>
              </div>
              <div id="modifierPlayerStatus" class="modifier-player-status" aria-live="polite"></div>
              <div class="modifier-preset-row" aria-label="Шаги выбранного игрока">
                <span>Шаги</span>
                <button class="secondary" type="button" data-step-bonus-preset="-5">-5</button>
                <button class="secondary" type="button" data-step-bonus-preset="5">+5</button>
                <button class="secondary" type="button" data-step-bonus-preset="-50">-50</button>
                <button class="secondary" type="button" data-step-bonus-preset="50">+50</button>
              </div>
              <div class="modifier-preset-row" aria-label="Сила выбранного игрока">
                <span>Сила</span>
                <button class="secondary" type="button" data-battle-bonus-preset="-5">-5</button>
                <button class="secondary" type="button" data-battle-bonus-preset="5">+5</button>
                <button class="secondary" type="button" data-battle-bonus-preset="-50">-50</button>
                <button class="secondary" type="button" data-battle-bonus-preset="50">+50</button>
              </div>
              <label class="settings-select">
                <span>Кубиков</span>
                <select id="diceCount">
                  <option value="1" selected>1</option>
                  <option value="2">2</option>
                  <option value="3">3</option>
                  <option value="4">4</option>
                </select>
              </label>
              <label class="settings-select">
                <span>Поле</span>
                <select id="boardSelect">
                  <option value="field1">Поле 1</option>
                  <option value="field2" selected>Поле 2</option>
                </select>
              </label>
              <label class="settings-select">
                <span>UI</span>
                <select id="uiStyle">
                  <option value="tabletop">Настольный</option>
                  <option value="classic" selected>Классический</option>
                </select>
              </label>
              <label class="settings-select">
                <span>Шрифт</span>
                <select id="fontStyle">
                  <option value="standard" selected>Стандартный</option>
                  <option value="adventure">Приключение</option>
                </select>
              </label>
              <label class="settings-select">
                <span>Сила монстров</span>
                <select id="monsterStrengthMode">
                  <option value="standard" selected>Стандартные</option>
                  <option value="strong">Сильные</option>
                </select>
              </label>
              <label class="settings-select">
                <span>Монет на старте</span>
                <select id="startingCoins">
                  <option value="10" selected>10</option>
                  <option value="20">20</option>
                </select>
              </label>
              <label class="settings-select">
                <span>Скорость ботов</span>
                <select id="botSpeed">
                  <option value="standard" selected>Стандартно</option>
                  <option value="fast">Быстро</option>
                </select>
              </label>
              <label class="cheat-toggle">
                <input id="autoRevealCards" type="checkbox" />
                <span>Сразу открывать карты</span>
              </label>
              <label class="cheat-toggle">
                <input id="showWalkPath" type="checkbox" />
                <span>Показывать контур хода</span>
              </label>
            </div>
          </section>
          <section class="tadam-card">
            <div class="section-title">
              <h2>ТАДАМ!</h2>
              <span class="pill">до 3 карт</span>
            </div>
            <div id="tadamTable" class="tadam-table"></div>
          </section>
        </aside>
      </section>

      <section class="lower-grid">
        <article id="referencePanel" class="reference-panel" aria-label="Справочник карт и полей" hidden>
          <section class="reference-toggle-panel" aria-label="Показать карты и поля">
            <strong>Показать карты и поля</strong>
            <div class="reference-toggle-list">
              <button class="secondary reference-toggle" type="button" data-reference-toggle="good" aria-pressed="false">
                <img class="reference-toggle-icon" src="./assets/cards/good_back.png" alt="" aria-hidden="true">
                <span class="reference-toggle-label">Хорошо</span>
              </button>
              <button class="secondary reference-toggle" type="button" data-reference-toggle="bad" aria-pressed="false">
                <img class="reference-toggle-icon" src="./assets/cards/bad_back.png" alt="" aria-hidden="true">
                <span class="reference-toggle-label">Плохо</span>
              </button>
              <button class="secondary reference-toggle" type="button" data-reference-toggle="shop" aria-pressed="false">
                <img class="reference-toggle-icon" src="./assets/cards/shop_back.png" alt="" aria-hidden="true">
                <span class="reference-toggle-label">Лавка Джо</span>
              </button>
              <button class="secondary reference-toggle" type="button" data-reference-toggle="tadam" aria-pressed="false">
                <img class="reference-toggle-icon" src="./assets/cards/tadam_back.png" alt="" aria-hidden="true">
                <span class="reference-toggle-label">Тадам!</span>
              </button>
              <button class="secondary reference-toggle" type="button" data-reference-toggle="event" aria-pressed="false">
                <img class="reference-toggle-icon" src="./assets/cards/event_back.png" alt="" aria-hidden="true">
                <span class="reference-toggle-label">События</span>
              </button>
              <button class="secondary reference-toggle" type="button" data-reference-toggle="fields" aria-pressed="false">
                <img class="reference-toggle-icon reference-toggle-icon-field" src="./assets/icons/start_512.png" alt="" aria-hidden="true">
                <span class="reference-toggle-label">Поля</span>
              </button>
            </div>
          </section>
          <div id="referenceOutput" class="reference-output" hidden></div>
        </article>
        <article class="log-panel">
          <div class="section-title">
            <h2>Хроника</h2>
            <button id="logToggle" class="log-toggle" type="button" aria-expanded="false">Показать 20</button>
          </div>
          <ol id="gameLog" class="game-log"></ol>
        </article>
        <article class="history-panel">
          <div class="section-title">
            <h2>История</h2>
            <button id="saveHistoryBtn" class="history-save" type="button">Сохранить</button>
          </div>
          <div id="gameHistory" class="game-history"></div>
        </article>
      </section>

    </main>

    <script type="module" src="./src/game.js?v=20260623-0034"></script>
  </body>
</html>
