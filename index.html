<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Очень Большая Бродилка — веб-прототип</title>
    <link rel="stylesheet" href="./styles.css?v=20260531-0256" />
  </head>
  <body>
    <main class="app-shell">
      <section class="score-strip" id="scoreStrip" aria-label="Игроки"></section>

      <section class="play-area">
        <article class="board-panel" aria-label="Игровое поле">
          <div class="board-header">
            <div class="dice-panel">
              <span id="diceValue">-</span>
              <div id="fieldEffect" class="field-effect"></div>
              <div id="turnActions" class="turn-actions" aria-label="Доступные действия"></div>
              <button id="rollBtn">Бросить <img class="dice-icon" src="./assets/icons/dice.png?v=20260524-0305" alt="" aria-hidden="true"></button>
            </div>
          </div>
          <div class="map-wrap">
            <div id="eventToast" class="event-toast" role="button" tabindex="0" aria-live="polite" hidden></div>
            <div id="finalBattleHud" class="final-battle-hud" aria-live="polite" hidden></div>
            <div id="winnerPopup" class="winner-popup" aria-live="polite" hidden></div>
            <div id="choicePanel" class="choice-panel" role="dialog" aria-live="polite" hidden></div>
            <div id="board" class="board"></div>
          </div>
        </article>

        <aside class="side-panel" aria-label="Информация партии">
          <section class="game-settings" aria-label="Панель партии">
            <div class="season-controls">
              <label>
                Игроков
                <select id="playerCount">
                  <option value="2" selected>2</option>
                  <option value="3">3</option>
                  <option value="4">4</option>
                </select>
              </label>
              <label>
                Ботов
                <select id="botCount">
                  <option value="0" selected>0</option>
                  <option value="1">1</option>
                  <option value="2">2</option>
                  <option value="3">3</option>
                  <option value="4">4</option>
                </select>
              </label>
              <label aria-label="Кубиков">
                <img class="dice-icon setup-dice-icon" src="./assets/icons/dice.png?v=20260524-0305" alt="" aria-hidden="true">
                <select id="diceCount">
                  <option value="1" selected>1</option>
                  <option value="2">2</option>
                  <option value="3">3</option>
                  <option value="4">4</option>
                </select>
              </label>
              <button id="settingsToggle" class="secondary settings-toggle" type="button" aria-expanded="false">Настройки</button>
              <button id="newGameBtn" class="secondary">Новая игра</button>
            </div>
            <div id="settingsPanel" class="settings-panel" hidden>
              <label class="settings-select">
                <span>Поле</span>
                <select id="boardSelect">
                  <option value="field1" selected>Поле 1</option>
                  <option value="field2">Поле 2</option>
                </select>
              </label>
              <div id="modifierPlayerStatus" class="modifier-player-status" aria-live="polite"></div>
              <div class="modifier-preset-row" aria-label="Шаги выбранного игрока">
                <span>Шаги</span>
                <button class="secondary" type="button" data-step-bonus-preset="5">+5</button>
                <button class="secondary" type="button" data-step-bonus-preset="-5">-5</button>
                <button class="secondary" type="button" data-step-bonus-preset="50">+50</button>
                <button class="secondary" type="button" data-step-bonus-preset="-50">-50</button>
              </div>
              <div class="modifier-preset-row" aria-label="Сила выбранного игрока">
                <span>Сила</span>
                <button class="secondary" type="button" data-battle-bonus-preset="5">+5</button>
                <button class="secondary" type="button" data-battle-bonus-preset="-5">-5</button>
                <button class="secondary" type="button" data-battle-bonus-preset="50">+50</button>
                <button class="secondary" type="button" data-battle-bonus-preset="-50">-50</button>
              </div>
              <div class="exact-move-row" aria-label="Чит точного движения активного игрока">
                <label class="settings-select exact-move-setting">
                  <span>Пройти</span>
                  <input id="exactMoveAmount" type="number" min="0" step="1" value="4" />
                </label>
                <button id="exactMoveBtn" class="secondary" type="button">Идти</button>
              </div>
              <label class="settings-select">
                <span>Проход</span>
                <select id="passThroughMode">
                  <option value="default" selected>По умолчанию</option>
                  <option value="monsters">Монстры не останавливают</option>
                  <option value="all">Проходить все</option>
                </select>
              </label>
              <label class="cheat-toggle">
                <input id="autoRevealCards" type="checkbox" />
                <span>Сразу открывать карты</span>
              </label>
              <label class="cheat-toggle">
                <input id="showWalkPath" type="checkbox" />
                <span>Показывать контур хода</span>
              </label>
            </div>
          </section>
          <section class="tadam-card">
            <div class="section-title">
              <h2>ТАДАМ!</h2>
              <span class="pill">до 3 карт</span>
            </div>
            <div id="tadamTable" class="tadam-table"></div>
          </section>
        </aside>
      </section>

      <section class="lower-grid">
        <article class="log-panel">
          <div class="section-title">
            <h2>Хроника</h2>
          </div>
          <ol id="gameLog" class="game-log"></ol>
        </article>
      </section>

    </main>

    <script type="module" src="./src/game.js?v=20260531-0256"></script>
  </body>
</html>
